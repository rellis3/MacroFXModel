<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Macro Model</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/index.css">
<link rel="stylesheet" href="./css/gold.css">
</head>
<body>
<div id="goldApp">

<div class="sticky-header" id="goldStickyHeader">
  <div class="topbar">
    <!-- Gold logo mark -->
    <div class="logo-box" style="background:linear-gradient(135deg,#b8860b,#f4c430)">
      <svg viewBox="0 0 17 17"><polygon points="8.5,2 15,13 2,13" fill="none" stroke="#fff" stroke-width="1.5"/><line x1="8.5" y1="6" x2="8.5" y2="10" stroke="#fff" stroke-width="1.5"/><circle cx="8.5" cy="11.5" r="0.8" fill="#fff"/></svg>
    </div>
    <div class="title-block">
      <div class="title">Gold Macro Model</div>
      <div class="sub">Two-Layer · Adaptive Regime · XAU/USD · FRED Live</div>
    </div>
    <div class="spacer"></div>

    <!-- Live price pill -->
    <div class="hdr-price" style="display:flex">
      <span id="goldPricePill">XAU/USD —</span>
    </div>

    <!-- Last updated -->
    <span class="upd">Updated: <span id="updTime">—</span></span>

    <!-- Dark toggle -->
    <button class="dark-btn" id="darkToggle" onclick="window.goldApp && window.goldApp.toggleDark()">🌙 Dark</button>

    <!-- Lab + Dashboard links -->
    <a href="gold-lab.html" style="text-decoration:none">
      <button class="dark-btn" title="Gold Model Lab — historical reconstruction &amp; ML dataset">⚗ Gold Lab</button>
    </a>
    <a href="index.html" style="text-decoration:none">
      <button class="dark-btn" title="Back to main dashboard">← Dashboard</button>
    </a>

    <div class="live-pill"><div class="live-dot"></div>Live</div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="sdot" id="sdot"></div>
    <div class="stxt" id="stxt">Initialising…</div>
    <div class="data-pills">
      <span class="dpill" id="pillFred">FRED</span>
      <span class="dpill" id="pillHistory">HISTORY</span>
      <span class="dpill" id="pillOhlc">DAILY</span>
      <span class="dpill" id="pill5m">5MIN</span>
      <span class="dpill" id="pillQuote">QUOTE</span>
      <span class="dpill" id="pillCot">COT</span>
    </div>
  </div>
</div><!-- /.sticky-header -->

<!-- ZONE TICKER — persistent div, updated by 5s interval independent of goldRoot -->
<div id="goldZoneTicker"></div>

<!-- MAIN CONTENT -->
<div id="goldRoot">
  <div class="ld-spin"></div>
</div>

</div><!-- /#goldApp -->

<script type="module" src="./js/gold-app.js"></script>
</body>
</html>
