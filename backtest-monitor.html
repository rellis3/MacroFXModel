<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backtest Bot Monitor — MacroFX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap">
<style>
:root {
  --bg:#f4f6fb; --s1:#fff; --s2:#f0f3f8; --s3:#e8edf6;
  --border:#dde3ed; --border2:#c5cedd;
  --text:#0d1520; --text2:#4b5a6e; --text3:#8fa0b8;
  --green:#0a8a5c; --green-bg:#edfaf4; --green-bd:#a3e6ca;
  --red:#c8222a;   --red-bg:#fff1f1;   --red-bd:#f5b8b8;
  --amber:#b45309; --amber-bg:#fffbeb; --amber-bd:#fde68a;
  --blue:#1d4ed8;  --blue-bg:#eff6ff;  --blue-bd:#bfdbfe;
  --rl:10px;
}
body.dark {
  --bg:#0f1117; --s1:#1a1d27; --s2:#22263a; --s3:#2a2f45;
  --border:#2e3347; --border2:#3d4460;
  --text:#e8eaf2; --text2:#9ba3bf; --text3:#5a6380;
  --green:#10b981; --green-bg:#0d2b22; --green-bd:#1a4a38;
  --red:#f87171;   --red-bg:#2b1a1a;   --red-bd:#4a2828;
  --amber:#fbbf24; --amber-bg:#292100; --amber-bd:#78610a;
  --blue:#60a5fa;  --blue-bg:#172554;  --blue-bd:#1e40af;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.5; }

.top-bar { background:var(--s1); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:16px; }
.top-bar .logo { font-size:15px; font-weight:600; }
.top-bar .sub  { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; }
.top-bar .back { margin-left:auto; font-size:12px; color:var(--text3); text-decoration:none; }
.top-bar .back:hover { color:var(--text); }
.dark-btn { background:none; border:1.5px solid var(--border); border-radius:20px; padding:4px 12px; cursor:pointer; font-size:11px; color:var(--text2); }

.page { max-width:1100px; margin:0 auto; padding:20px 16px 80px; }

.meta-bar { display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
.meta-bar .badge { font-size:11px; font-family:'DM Mono',monospace; padding:4px 10px; border-radius:20px; }
.meta-bar .badge.ok  { background:var(--green-bg); border:1px solid var(--green-bd); color:var(--green); }
.meta-bar .badge.dim { background:var(--s2); border:1px solid var(--border); color:var(--text3); }
.meta-bar .badge.warn{ background:var(--amber-bg); border:1px solid var(--amber-bd); color:var(--amber); }
#lastUpdate { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; margin-left:auto; }

.pair-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:14px; }

.pair-card { background:var(--s1); border:1px solid var(--border); border-radius:var(--rl); overflow:hidden; transition:border-color .2s; }
.pair-card.in-zone { border-color:var(--amber-bd); box-shadow:0 0 0 2px var(--amber-bg); }
.pair-card.trading { border-color:var(--green-bd); box-shadow:0 0 0 2px var(--green-bg); }

.card-head { padding:11px 14px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); }
.pair-name { font-size:13px; font-weight:600; font-family:'DM Mono',monospace; }
.pair-price { font-size:12px; font-family:'DM Mono',monospace; color:var(--text2); }
.pair-badges { margin-left:auto; display:flex; gap:5px; }
.zone-badge { font-size:10px; font-weight:600; padding:2px 7px; border-radius:10px; }
.zone-badge.in  { background:var(--amber-bg); border:1px solid var(--amber-bd); color:var(--amber); }
.zone-badge.dir-long  { background:var(--green-bg); border:1px solid var(--green-bd); color:var(--green); }
.zone-badge.dir-short { background:var(--red-bg); border:1px solid var(--red-bd); color:var(--red); }

.asia-bar { padding:8px 14px; border-bottom:1px solid var(--border); }
.asia-label { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--text3); font-weight:600; margin-bottom:5px; }
.asia-range-row { display:flex; align-items:center; gap:8px; }
.asia-val { font-size:11px; font-family:'DM Mono',monospace; color:var(--text2); white-space:nowrap; }
.asia-track { flex:1; height:6px; background:var(--s3); border-radius:3px; position:relative; overflow:visible; }
.asia-fill  { height:100%; background:var(--blue-bd); border-radius:3px; }
.price-tick { position:absolute; top:-3px; width:2px; height:12px; background:var(--amber); border-radius:1px; transform:translateX(-50%); }

.levels-section { padding:8px 14px 12px; }
.levels-label { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--text3); font-weight:600; margin-bottom:6px; }
.level-row { display:flex; align-items:center; gap:6px; padding:3px 0; border-bottom:1px solid var(--border); font-size:11px; font-family:'DM Mono',monospace; }
.level-row:last-child { border-bottom:none; }
.level-row.nearest  { background:var(--amber-bg); margin:0 -14px; padding:3px 14px; }
.level-arrow { width:14px; text-align:center; color:var(--text3); }
.level-price { flex:1; color:var(--text); }
.level-fib   { color:var(--text3); min-width:36px; text-align:right; }
.level-dist  { min-width:48px; text-align:right; }
.level-dist.close  { color:var(--amber); font-weight:600; }
.level-dist.medium { color:var(--text2); }
.level-dist.far    { color:var(--text3); }
.tight-dot { width:5px; height:5px; border-radius:50%; background:var(--green); display:inline-block; margin-left:3px; }

.feat-section { padding:6px 14px 10px; border-top:1px solid var(--border); font-size:11px; font-family:'DM Mono',monospace; color:var(--text2); }
.feat-label { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--text3); font-weight:600; margin-bottom:4px; }
.feat-conv { display:flex; gap:12px; flex-wrap:wrap; }
.feat-val { color:var(--text); }
.feat-val.long  { color:var(--green); }
.feat-val.short { color:var(--red); }

.no-data { text-align:center; padding:60px 20px; color:var(--text3); font-family:'DM Mono',monospace; font-size:12px; }

.pos-section { padding:8px 14px 10px; border-top:2px solid var(--green-bd); background:var(--green-bg); }
.pos-label { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--green); font-weight:600; margin-bottom:6px; }
.pos-row { display:flex; align-items:center; gap:8px; font-size:11px; font-family:'DM Mono',monospace; margin-bottom:2px; flex-wrap:wrap; }
.pos-detail { font-size:10px; font-family:'DM Mono',monospace; color:var(--text3); margin-bottom:2px; }
.pos-entry { color:var(--text); }
.pos-level { color:var(--text3); flex:1; }
.pnl-pos { color:var(--green); font-weight:600; }
.pnl-neg { color:var(--red);   font-weight:600; }

/* ── Trade Journal ── */
.journal-section { margin-top:28px; }
.journal-head { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.journal-title { font-size:13px; font-weight:600; }
.journal-count { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; }
.journal-refresh { background:none; border:1px solid var(--border2); border-radius:6px; padding:3px 10px; font-size:11px; color:var(--text2); cursor:pointer; }
.journal-refresh:hover { color:var(--text); }

.jday-header { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin:16px 0 8px; padding-top:10px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.jday-header:first-child { border-top:none; margin-top:0; padding-top:0; }
.jday-pnl { font-size:11px; font-family:'DM Mono',monospace; font-weight:600; }
.jday-pnl.pos { color:var(--green); }
.jday-pnl.neg { color:var(--red); }

.jgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:10px; }

.jcard { background:var(--s1); border:1px solid var(--border); border-left:3px solid var(--border2); border-radius:var(--rl); padding:12px 14px; }
.jcard.open     { border-left-color:var(--amber); }
.jcard.c-tp     { border-left-color:var(--green); }
.jcard.c-sl     { border-left-color:var(--red); }
.jcard.c-be     { border-left-color:var(--blue); }
.jcard.c-manual { border-left-color:var(--text3); }

.jcard-head { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:7px; }
.jcard-pair { font-size:13px; font-weight:600; font-family:'DM Mono',monospace; }
.jcard-dir  { font-size:10px; padding:2px 7px; border-radius:4px; font-family:'DM Mono',monospace; font-weight:600; }
.jcard-dir.long  { background:var(--green-bg); color:var(--green); border:1px solid var(--green-bd); }
.jcard-dir.short { background:var(--red-bg);   color:var(--red);   border:1px solid var(--red-bd); }
.jcard-time { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; }
.jbadge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; white-space:nowrap; margin-left:auto; }
.jbadge.open   { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-bd); }
.jbadge.tp     { background:var(--green-bg); color:var(--green); border:1px solid var(--green-bd); }
.jbadge.sl     { background:var(--red-bg);   color:var(--red);   border:1px solid var(--red-bd); }
.jbadge.be     { background:var(--blue-bg);  color:var(--blue);  border:1px solid var(--blue-bd); }
.jbadge.manual { background:var(--s2);       color:var(--text3); border:1px solid var(--border); }
.jpnl { font-size:12px; font-weight:600; font-family:'DM Mono',monospace; }
.jpnl.pos { color:var(--green); }
.jpnl.neg { color:var(--red); }

.jmeta { display:flex; gap:10px; flex-wrap:wrap; font-size:10.5px; color:var(--text3); font-family:'DM Mono',monospace; margin-bottom:6px; }
.jchips { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:7px; }
.jchip { font-size:10px; padding:2px 6px; border-radius:10px; background:var(--s3); color:var(--text2); border:1px solid var(--border); }
.jsvg-wrap { border-radius:6px; overflow:hidden; background:var(--s2); }
.jsvg { width:100%; display:block; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="logo">MacroFX · Backtest Bot Monitor</div>
    <div class="sub">Live levels &amp; proximity</div>
  </div>
  <a class="back" href="bot-config.html">← Bot Config</a>
  <a class="back" href="index.html" style="margin-left:0">← Dashboard</a>
  <button class="dark-btn" onclick="document.body.classList.toggle('dark')">◑ Dark</button>
</div>

<div class="page">

  <div class="meta-bar">
    <span id="dateBadge" class="badge dim">—</span>
    <span id="pairsBadge" class="badge dim">— pairs</span>
    <span id="zoneBadge"  class="badge dim">— in zone</span>
    <span id="lastUpdate">Never updated</span>
  </div>

  <div id="pairGrid" class="pair-grid">
    <div class="no-data">Waiting for backtestSystem data…<br>Make sure main.py is running and DASHBOARD_URL is set in .env</div>
  </div>

  <!-- Trade Journal -->
  <div class="journal-section">
    <div class="journal-head">
      <span class="journal-title">Trade Journal</span>
      <span id="jCount" class="journal-count"></span>
      <button class="journal-refresh" onclick="refreshJournal()">↺ Refresh</button>
    </div>
    <div id="jList">
      <div style="color:var(--text3);font-size:12px;font-family:'DM Mono',monospace">Loading…</div>
    </div>
  </div>

</div>

<script>
async function kvGet(key) {
  const r = await fetch(`/api/kv/get?key=${encodeURIComponent(key)}`);
  if (!r.ok) return null;
  const j = await r.json();
  return j.miss ? null : j.data;
}

function distClass(pips) {
  if (pips <= 5)  return 'close';
  if (pips <= 15) return 'medium';
  return 'far';
}

function priceTickPct(price, low, high) {
  if (high <= low) return 50;
  return Math.max(0, Math.min(100, ((price - low) / (high - low)) * 100));
}

function renderPair(pair, d) {
  const inZone  = d.in_zone;
  const hasDir  = d.direction && inZone;
  const dir     = d.direction || '';
  const cardCls = hasDir ? 'pair-card trading' : (inZone ? 'pair-card in-zone' : 'pair-card');

  // Badges
  let badges = '';
  if (inZone) badges += '<span class="zone-badge in">IN ZONE</span>';
  if (dir === 'long')  badges += '<span class="zone-badge dir-long">LONG</span>';
  if (dir === 'short') badges += '<span class="zone-badge dir-short">SHORT</span>';

  // Asia range bar
  let asiaHtml = '<div class="asia-bar"><div class="asia-label">Asia Range</div>';
  if (d.asia) {
    const { low, high, range_pips } = d.asia;
    const tickPct = d.price ? priceTickPct(d.price, low, high) : null;
    asiaHtml += `
      <div class="asia-range-row">
        <span class="asia-val">${low.toFixed(5)}</span>
        <div class="asia-track">
          <div class="asia-fill" style="width:100%"></div>
          ${tickPct !== null ? `<div class="price-tick" style="left:${tickPct}%"></div>` : ''}
        </div>
        <span class="asia-val">${high.toFixed(5)}</span>
        <span class="asia-val" style="color:var(--text3)">${range_pips}p</span>
      </div>`;
  } else {
    asiaHtml += '<div style="font-size:11px;color:var(--text3)">Range not yet formed</div>';
  }
  asiaHtml += '</div>';

  // Levels table
  let levelsHtml = '<div class="levels-section"><div class="levels-label">Confluence Levels</div>';
  if (d.confluences && d.confluences.length) {
    const nearest = d.confluences[0];
    d.confluences.forEach((c, i) => {
      const isNearest = i === 0;
      const arrow     = c.above ? '↑' : '↓';
      const fibStr    = c.fib != null ? c.fib.toFixed(2) : '—';
      const tight     = c.isTight ? '<span class="tight-dot" title="Tight confluence"></span>' : '';
      const distCls   = distClass(c.dist_pips);
      const rowCls    = isNearest ? 'level-row nearest' : 'level-row';
      levelsHtml += `
        <div class="${rowCls}">
          <span class="level-arrow">${arrow}</span>
          <span class="level-price">${c.price.toFixed(5)}${tight}</span>
          <span class="level-fib">${fibStr}</span>
          <span class="level-dist ${distCls}">${c.dist_pips.toFixed(1)}p</span>
        </div>`;
    });
  } else {
    levelsHtml += '<div style="font-size:11px;color:var(--text3);padding:4px 0">No confluences — may still be forming</div>';
  }
  levelsHtml += '</div>';

  // Feature conviction (only when in zone)
  let featHtml = '';
  if (inZone && d.conviction !== null) {
    const convPct  = Math.round((d.conviction ?? 0) * 100);
    const dirCls   = dir === 'long' ? 'long' : (dir === 'short' ? 'short' : '');
    featHtml = `
      <div class="feat-section">
        <div class="feat-label">Feature Score</div>
        <div class="feat-conv">
          <span>Direction: <span class="feat-val ${dirCls}">${dir || 'none'}</span></span>
          <span>Conviction: <span class="feat-val">${convPct}%</span></span>
          <span>Confirms: <span class="feat-val">${d.confirms ?? '—'}</span></span>
        </div>
      </div>`;
  }

  // Open positions
  let posHtml = '';
  if (d.positions && d.positions.length) {
    posHtml = '<div class="pos-section"><div class="pos-label">Open Position</div>';
    d.positions.forEach(p => {
      const dCls    = p.direction === 'long' ? 'dir-long' : 'dir-short';
      const pnlCls  = p.profit >= 0 ? 'pnl-pos' : 'pnl-neg';
      const pnlStr  = (p.profit >= 0 ? '+' : '') + p.profit.toFixed(2);
      const levStr  = p.level != null
        ? `@ ${p.level.toFixed(5)}${p.level_fib != null ? ' ('+p.level_fib.toFixed(2)+')' : ''}`
        : '';
      posHtml += `
        <div class="pos-row">
          <span class="zone-badge ${dCls}">${p.direction.toUpperCase()}</span>
          <span class="pos-entry">${p.open_price.toFixed(5)}</span>
          <span class="pos-level">${levStr}</span>
          <span class="${pnlCls}">${pnlStr}</span>
        </div>
        <div class="pos-detail">SL ${p.sl.toFixed(5)} · TP ${p.tp.toFixed(5)} · ${p.lots} lots · #${p.ticket}</div>`;
    });
    posHtml += '</div>';
  }

  const priceStr = d.price != null ? d.price.toFixed(5) : '—';

  return `
    <div class="${cardCls}">
      <div class="card-head">
        <span class="pair-name">${pair}</span>
        <span class="pair-price">${priceStr}</span>
        <div class="pair-badges">${badges}</div>
      </div>
      ${asiaHtml}
      ${levelsHtml}
      ${featHtml}
      ${posHtml}
    </div>`;
}

async function refresh() {
  try {
    const data = await kvGet('backtestsystem_status');
    if (!data) {
      return;
    }

    const pairs    = Object.entries(data.pairs || {});
    const inZone   = pairs.filter(([, d]) => d.in_zone).length;
    const ageSec   = Math.round((Date.now() - (data.timestamp || 0)) / 1000);
    const ageStr   = ageSec < 60 ? `${ageSec}s ago` : `${Math.round(ageSec/60)}m ago`;
    const inWin    = data.in_window;

    document.getElementById('dateBadge').textContent  = data.date || '—';
    document.getElementById('dateBadge').className    = 'badge ok';
    document.getElementById('pairsBadge').textContent = `${pairs.length} pairs`;
    document.getElementById('pairsBadge').className   = pairs.length ? 'badge ok' : 'badge dim';
    document.getElementById('zoneBadge').textContent  = inWin === false ? 'outside window' : `${inZone} in zone`;
    document.getElementById('zoneBadge').className    = inWin === false ? 'badge dim' : (inZone ? 'badge warn' : 'badge dim');
    document.getElementById('lastUpdate').textContent = `Updated ${ageStr}`;

    if (!pairs.length) {
      const msg = inWin === false
        ? 'Outside trade window — monitoring paused. Levels will appear after entryWindow time.'
        : 'Bot running but no price data yet — Asia session may still be forming (opens at 06:00 London).';
      document.getElementById('pairGrid').innerHTML =
        `<div class="no-data">${msg}</div>`;
      return;
    }

    document.getElementById('pairGrid').innerHTML =
      pairs.map(([pair, d]) => renderPair(pair, d)).join('');

  } catch (e) {
    console.error('Monitor refresh error:', e);
  }
}

refresh();
setInterval(refresh, 30_000);

// ── Trade Journal ─────────────────────────────────────────────────────────────

function buildSvg(rec) {
  const bars = rec.bars || [];
  const W = 460, H = 100;
  const ml = 38, mr = 6, mt = 7, mb = 8;
  const cw = W - ml - mr, ch = H - mt - mb;

  if (!bars.length) {
    return `<svg viewBox="0 0 ${W} 36" class="jsvg" height="36">` +
      `<text x="${W/2}" y="21" text-anchor="middle" font-size="11" fill="var(--text3)" ` +
      `font-family="DM Sans,sans-serif">Trade open — bars accumulate on next poll</text></svg>`;
  }

  // Price range including all key levels
  const prices = bars.flatMap(b => [b.h, b.l]);
  prices.push(rec.entry_price, rec.sl, rec.tp);
  if (rec.be_price != null) prices.push(rec.be_price);
  const pMin = Math.min(...prices), pMax = Math.max(...prices);
  const pRange = pMax - pMin || (rec.pip || 0.0001) * 10;
  const pad = pRange * 0.14;
  const yLo = pMin - pad, yHi = pMax + pad, yRange = yHi - yLo;

  function yp(p)  { return +(mt + ch * (1 - (p - yLo) / yRange)).toFixed(1); }
  const slot = Math.min(cw / bars.length, 14);
  function xl(i)  { return +(ml + i * slot).toFixed(1); }
  function xc(i)  { return +(ml + i * slot + slot * 0.5).toFixed(1); }
  const bw = Math.max(+(slot * 0.72).toFixed(1), 1);

  let svg = `<svg viewBox="0 0 ${W} ${H}" class="jsvg" height="${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Trade-period shade
  const ets = rec.entry_ts_ms || 0;
  const exts = rec.exit_time ? new Date(rec.exit_time).getTime() : Infinity;
  let fi = -1, li = -1;
  for (let i = 0; i < bars.length; i++) {
    if (bars[i].t >= ets && bars[i].t <= exts) { if (fi < 0) fi = i; li = i; }
  }
  if (fi >= 0) {
    svg += `<rect x="${xl(fi)}" y="${mt}" width="${+(xl(li) - xl(fi) + slot).toFixed(1)}" height="${ch}" fill="rgba(96,165,250,0.07)"/>`;
  }

  // Level lines
  const lvs = [
    { p: rec.tp,           c: 'var(--green)',  l: 'TP',  d: '4 2' },
    { p: rec.entry_price,  c: 'var(--blue)',   l: 'Ent', d: '3 2' },
    { p: rec.sl,           c: 'var(--red)',    l: 'SL',  d: '4 2' },
  ];
  if (rec.be_price != null) lvs.push({ p: rec.be_price, c: 'var(--amber)', l: 'BE', d: '2 2' });
  for (const lv of lvs) {
    const y = yp(lv.p);
    svg += `<line x1="${ml}" y1="${y}" x2="${W-mr}" y2="${y}" stroke="${lv.c}" stroke-width="1" stroke-dasharray="${lv.d}" opacity="0.75"/>`;
    svg += `<text x="${ml-3}" y="${y+3}" text-anchor="end" font-size="8" fill="${lv.c}" font-family="DM Mono,monospace">${lv.l}</text>`;
  }

  // Candlesticks
  for (let i = 0; i < bars.length; i++) {
    const b = bars[i];
    const yo = yp(b.o), yc2 = yp(b.c), yh2 = yp(b.h), yl2 = yp(b.l);
    const top = Math.min(yo, yc2), bh = Math.max(Math.abs(yo - yc2), 1);
    const col = b.c >= b.o ? 'var(--green)' : 'var(--red)';
    svg += `<line x1="${xc(i)}" y1="${yh2}" x2="${xc(i)}" y2="${yl2}" stroke="${col}" stroke-width="1" opacity="0.7"/>`;
    svg += `<rect x="${xl(i)}" y="${top}" width="${bw}" height="${bh}" fill="${col}" opacity="0.85"/>`;
  }

  // Entry / exit verticals
  if (fi >= 0) svg += `<line x1="${xl(fi)}" y1="${mt}" x2="${xl(fi)}" y2="${mt+ch}" stroke="var(--blue)" stroke-width="1.5" opacity="0.4"/>`;
  if (rec.exit_time && li >= 0) {
    const ec = rec.exit_type === 'tp' ? 'var(--green)' : rec.exit_type === 'be' ? 'var(--blue)' : 'var(--red)';
    svg += `<line x1="${+(xl(li)+slot).toFixed(1)}" y1="${mt}" x2="${+(xl(li)+slot).toFixed(1)}" y2="${mt+ch}" stroke="${ec}" stroke-width="1.5" opacity="0.4"/>`;
  }

  return svg + '</svg>';
}

function renderCard(rec) {
  const isOpen   = rec.status === 'open';
  const badge    = isOpen ? 'open' : (rec.exit_type || 'manual');
  const lbl      = { tp:'TP HIT', sl:'SL HIT', be:'BE EXIT', manual:'MANUAL', open:'OPEN' };
  const cls      = isOpen ? 'open' : `c-${badge}`;
  const pnlCls   = rec.pnl_r == null ? '' : rec.pnl_r > 0 ? 'pos' : rec.pnl_r < 0 ? 'neg' : '';
  const pnlStr   = rec.pnl_r == null ? '' :
    `${rec.pnl_r > 0 ? '+' : ''}${rec.pnl_r.toFixed(2)}R&nbsp;${rec.pnl_pips > 0 ? '+' : ''}${rec.pnl_pips.toFixed(1)}p`;
  const eHM      = rec.entry_time ? rec.entry_time.slice(11,16) : '—';
  const xHM      = rec.exit_time  ? rec.exit_time.slice(11,16)  : (isOpen ? 'open' : '—');
  let dur = '';
  if (rec.entry_time && rec.exit_time) {
    const m = Math.round((new Date(rec.exit_time) - new Date(rec.entry_time)) / 60000);
    dur = m < 60 ? ` (${m}m)` : ` (${Math.floor(m/60)}h${m%60}m)`;
  }
  const beTag  = rec.be_moved_at ? `<span style="font-size:10px;color:var(--amber)">BE@${rec.be_moved_at.slice(11,16)}</span>` : '';
  const chips  = (rec.features||[]).map(f=>`<span class="jchip">${f}</span>`).join('');
  return `<div class="jcard ${cls}">
  <div class="jcard-head">
    <span class="jcard-pair">${rec.pair}</span>
    <span class="jcard-dir ${rec.direction}">${rec.direction.toUpperCase()}</span>
    <span class="jcard-time">${eHM}→${xHM}${dur}</span>
    ${beTag}
    <span class="jbadge ${badge}">${lbl[badge]||badge.toUpperCase()}</span>
    ${pnlStr?`<span class="jpnl ${pnlCls}">${pnlStr}</span>`:''}
  </div>
  <div class="jmeta">
    <span>@${rec.entry_price}</span>
    <span>SL ${rec.sl} (${rec.sl_dist_pips}p)</span>
    <span>TP ${rec.tp} (${rec.tp_dist_pips}p)</span>
    <span>${rec.lots}L</span>
    <span>conv ${Math.round((rec.conviction||0)*100)}%</span>
    ${rec.level_fib!=null?`<span>fib ${rec.level_fib}</span>`:''}
  </div>
  ${chips?`<div class="jchips">${chips}</div>`:''}
  <div class="jsvg-wrap">${buildSvg(rec)}</div>
</div>`;
}

async function refreshJournal() {
  const listEl  = document.getElementById('jList');
  const countEl = document.getElementById('jCount');
  if (!listEl) return;
  try {
    const data = await kvGet('backtestsystem_journal');
    if (!data || !data.length) {
      listEl.innerHTML = '<div style="color:var(--text3);font-size:12px;font-family:\'DM Mono\',monospace">No trades recorded yet.</div>';
      if (countEl) countEl.textContent = '0 trades';
      return;
    }
    const openN = data.filter(r => r.status==='open').length;
    if (countEl) countEl.textContent =
      `${data.length} trade${data.length!==1?'s':''}${openN ? ` · ${openN} open` : ''}`;

    // Group by date, newest first
    const byDate = {};
    for (const r of data) { const d = r.date||'Unknown'; (byDate[d]=byDate[d]||[]).push(r); }
    const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

    let html = '';
    for (const date of dates) {
      const recs   = byDate[date];
      const closed = recs.filter(r => r.pnl_r != null);
      const dayR   = closed.reduce((s, r) => s + (r.pnl_r||0), 0);
      const dayCls = dayR > 0 ? 'pos' : dayR < 0 ? 'neg' : '';
      const dayTag = closed.length
        ? ` <span class="jday-pnl ${dayCls}">${dayR>0?'+':''}${dayR.toFixed(2)}R</span>`
        : '';
      html += `<div class="jday-header">${date}${dayTag}</div><div class="jgrid">`;
      for (const r of recs) html += renderCard(r);
      html += '</div>';
    }
    listEl.innerHTML = html;
  } catch (e) {
    if (listEl) listEl.innerHTML =
      `<div style="color:var(--red);font-size:12px;font-family:'DM Mono',monospace">Error: ${e.message}</div>`;
  }
}

refreshJournal();
setInterval(refreshJournal, 120_000);
</script>
