<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entry Lens</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/index.css">
<style>
#alApp { padding: 0 20px 32px; max-width: 1300px; margin: 0 auto; }

/* ── Summary / filter bar ────────────────────────────────────────────────── */
.al-summary {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-top: 14px; padding: 10px 14px;
  background: var(--s1); border: 1.5px solid var(--border); border-radius: var(--rl);
}
.al-summary-label {
  font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text3); font-family: 'DM Mono', monospace;
}
.al-filter-btn {
  font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 600;
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--s2); color: var(--text2); cursor: pointer;
}
.al-filter-btn.active { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); }
.al-filter-btn .cnt { opacity: .7; margin-left: 4px; }

/* ── Card grid ────────────────────────────────────────────────────────────── */
.al-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 14px; }
@media (max-width: 900px) { .al-grid { grid-template-columns: 1fr; } }
@media (max-width: 1300px) and (min-width: 901px) { .al-grid { grid-template-columns: 1fr 1fr; } }

.al-card {
  background: var(--s1); border: 1.5px solid var(--border); border-radius: var(--rl);
  padding: 16px 18px 14px; display: flex; flex-direction: column; gap: 12px;
  transition: border-color .2s;
}
.al-card:hover { border-color: var(--border2); }
.al-card.verdict-ACT   { border-color: var(--green-bd); }
.al-card.verdict-AVOID { border-color: var(--red-bd); }

.al-card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.al-pair-name { font-size: 15px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
.al-price { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text2); margin-left: 8px; }

.al-verdict-badge {
  font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: .05em;
  padding: 5px 12px; border-radius: 20px; white-space: nowrap;
}
.al-verdict-badge.ACT   { background: var(--green-bg); border: 1px solid var(--green-bd); color: var(--green); }
.al-verdict-badge.WATCH { background: var(--amber-bg); border: 1px solid var(--amber-bd); color: var(--amber); }
.al-verdict-badge.WAIT  { background: var(--s2);        border: 1px solid var(--border2);  color: var(--text3); }
.al-verdict-badge.AVOID { background: var(--red-bg);   border: 1px solid var(--red-bd);   color: var(--red); }

.al-vol-pill {
  font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 12px;
  background: var(--blue-bg); border: 1px solid var(--blue-bd); color: var(--blue);
}
.al-vol-pill.HIGH { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red); }
.al-vol-pill.LOW  { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }

.al-macro-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.al-chip {
  font-size: 10px; font-weight: 600; font-family: 'DM Mono', monospace; padding: 3px 9px;
  border-radius: 12px; border: 1px solid var(--border); color: var(--text2); background: var(--s2);
}
.al-chip.LONG    { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
.al-chip.SHORT   { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red); }
.al-chip.NEUTRAL { color: var(--text3); }
.al-meta { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }

.al-section-label {
  font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 6px;
}

.al-levels { display: flex; flex-direction: column; gap: 4px; }
.al-lv-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 6px;
  background: var(--s2);
}
.al-lv-row.hit { opacity: .55; }
.al-lv-row.current { background: var(--blue-bg); border: 1px solid var(--blue-bd); font-weight: 700; }
.al-lv-label { color: var(--text3); }
.al-lv-price { color: var(--text); font-weight: 600; }

.al-bar-track { height: 6px; border-radius: 4px; background: var(--s2); overflow: hidden; margin-top: 8px; }
.al-bar-fill  { height: 100%; background: var(--blue); transition: width .3s; }
.al-bar-fill.hi { background: var(--red); }

.al-rationale {
  font-size: 11px; line-height: 1.5; color: var(--text2); padding: 8px 10px;
  background: var(--s2); border-radius: 8px; border-left: 3px solid var(--border2);
}
.al-rationale.ACT   { border-left-color: var(--green); }
.al-rationale.WATCH { border-left-color: var(--amber); }
.al-rationale.AVOID { border-left-color: var(--red); }

.al-empty-note { font-size: 10px; color: var(--text3); font-style: italic; }

.al-card { cursor: pointer; }

/* ── Z-score pills (yield compass + hedge correlation) ───────────────────── */
.al-z-pill {
  font-size: 10px; font-family: 'DM Mono', monospace; padding: 3px 9px; border-radius: 12px;
  background: var(--s2); border: 1px solid var(--border); color: var(--text2);
}

/* ── Deep-dive page ───────────────────────────────────────────────────────── */
#alDeepDive { margin-top: 14px; }
.al-dd-header { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
.al-back-link {
  font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 600; color: var(--text2);
  text-decoration: none; padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px;
}
.al-back-link:hover { border-color: var(--blue-bd); color: var(--blue); }
.al-dd-title { display: flex; align-items: center; gap: 10px; }

.al-dd-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; align-items: start; }
@media (max-width: 1000px) { .al-dd-grid { grid-template-columns: 1fr; } }
.al-dd-col { display: flex; flex-direction: column; gap: 14px; }

.al-zone-pill {
  display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'DM Mono', monospace;
  padding: 5px 10px; border-radius: 8px; background: var(--s2); border: 1px solid var(--border); color: var(--text);
}
.al-zone-pill.aligned  { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
.al-zone-pill.opposing { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red); }
.al-zone-stars { color: var(--amber); letter-spacing: -1px; }

.al-zone-table, .al-tier-table {
  width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'DM Mono', monospace; white-space: nowrap;
}
.al-zone-table th, .al-tier-table th {
  text-align: left; font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text3); padding: 6px 8px; border-bottom: 1.5px solid var(--border);
}
.al-zone-table td, .al-tier-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--text2); }
.al-zone-row.aligned  td { background: var(--green-bg); }
.al-zone-row.opposing td { color: var(--text3); }
.al-zone-row td:first-child, .al-tier-table td:first-child { color: var(--text); font-weight: 600; }

.al-tag {
  display: inline-block; font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
  background: var(--s3); border: 1px solid var(--border); color: var(--text3); margin: 1px 3px 1px 0;
}

.al-tier-score { font-weight: 700; }
.al-tier-score.LONG    { color: var(--green); }
.al-tier-score.SHORT   { color: var(--red); }
.al-tier-score.NEUTRAL { color: var(--text3); }
.al-tier-reading { color: var(--text3); white-space: normal; }

/* ── Zone Audit page ──────────────────────────────────────────────────────── */
.audit-page { padding-bottom: 40px; }
.audit-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.audit-title { font-size: 18px; font-weight: 700; color: var(--text); }
.audit-sub   { font-size: 11px; color: var(--text3); margin-top: 3px; }

.audit-filter-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 10px 14px; background: var(--s1); border: 1.5px solid var(--border);
  border-radius: var(--rl); margin-bottom: 14px;
}
.audit-filter-btn {
  font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 600;
  padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--s2); color: var(--text2); cursor: pointer;
}
.audit-filter-btn.active { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); }
.audit-filter-btn:disabled { opacity: .5; cursor: default; }
.audit-filter-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
.audit-filter-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
.audit-date-input {
  font-size: 11px; font-family: 'DM Mono', monospace; padding: 4px 8px;
  border: 1px solid var(--border); border-radius: 6px; background: var(--s2); color: var(--text);
}

.audit-stats-bar {
  display: flex; align-items: center; gap: 0; flex-wrap: wrap;
  padding: 12px 18px; background: var(--s1); border: 1.5px solid var(--border);
  border-radius: var(--rl); margin-bottom: 14px;
}
.audit-stat { display: flex; flex-direction: column; align-items: center; padding: 0 24px 0 0; margin-right: 24px; border-right: 1px solid var(--border); }
.audit-stat:last-of-type { border-right: none; }
.audit-stat-val { font-size: 20px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
.audit-stat-lbl { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }
.audit-stat-pct { font-size: 12px; font-weight: 400; color: var(--text3); }
.audit-stat-touched { color: var(--amber); }
.audit-stat-win     { color: var(--green); }
.audit-stat-loss    { color: var(--red); }
.audit-check-all-btn {
  font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 600;
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--s2); color: var(--text2); cursor: pointer; white-space: nowrap;
}
.audit-check-all-btn:hover:not(:disabled) { border-color: var(--blue-bd); color: var(--blue); }
.audit-check-all-btn:disabled { opacity: .4; cursor: default; }

.audit-table-wrap { overflow-x: auto; }
.audit-table {
  width: 100%; border-collapse: collapse; font-size: 11px;
  font-family: 'DM Mono', monospace; white-space: nowrap;
}
.audit-table th {
  text-align: left; font-size: 9px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text3); padding: 7px 10px;
  border-bottom: 1.5px solid var(--border); background: var(--s1);
  position: sticky; top: 0; z-index: 1;
}
.audit-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text2); }
.audit-row:hover td { background: var(--s2); }
.audit-day   { font-size: 9px; color: var(--text3); }
.audit-pair  { font-weight: 700; color: var(--text); }
.audit-stars { color: var(--amber); letter-spacing: -1px; }
.audit-price { font-weight: 600; color: var(--text); }
.audit-sl    { color: var(--red); }
.audit-tp    { color: var(--green); }
.audit-long  { color: var(--green); }
.audit-short { color: var(--red); }
.audit-empty-cell { text-align: center; color: var(--text3); padding: 28px !important; }
.audit-empty-msg { text-align: center; color: var(--text3); font-size: 12px; padding: 28px; font-style: italic; }
.audit-kv-tag { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 4px; background: #10b98122; color: #10b981; letter-spacing: .3px; vertical-align: middle; margin-left: 6px; }

/* ── Breakdown tables ─────────────────────────────────────────────────────── */
.audit-bkdn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 760px) { .audit-bkdn-row { grid-template-columns: 1fr; } }
.audit-bkdn-block { background: var(--s1); border: 1.5px solid var(--border); border-radius: var(--rl); padding: 14px 16px; }
.audit-bkdn-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 10px; }
.audit-bkdn-table { font-size: 11px; }
.audit-bkdn-label { font-weight: 600; color: var(--text); }

.audit-session-pill {
  font-size: 9px; font-weight: 600; letter-spacing: .06em;
  padding: 2px 7px; border-radius: 10px;
  background: var(--s2); border: 1px solid var(--border); color: var(--text3);
}

.audit-outcome {
  font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
  padding: 2px 7px; border-radius: 10px; white-space: nowrap;
  border: 1px solid transparent;
}
.audit-outcome.win     { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
.audit-outcome.loss    { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red); }
.audit-outcome.touched { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber); }
.audit-outcome.none    { background: var(--s2); border-color: var(--border); color: var(--text3); }
.audit-outcome.pending { color: var(--text3); }
.audit-outcome-lg { font-size: 12px; padding: 4px 12px; border-radius: 12px; }

.audit-actions { display: flex; gap: 4px; }
.audit-check-btn, .audit-view-btn {
  font-size: 11px; padding: 3px 8px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--s2); color: var(--text2);
  cursor: pointer; line-height: 1.3;
}
.audit-check-btn:hover, .audit-view-btn:hover { border-color: var(--blue-bd); color: var(--blue); }
.audit-check-btn:disabled { opacity: .4; cursor: default; }

/* ── M1 chart modal ───────────────────────────────────────────────────────── */
#auditModal { position: fixed; inset: 0; z-index: 9000; display: flex; align-items: center; justify-content: center; }
.audit-modal-backdrop {
  position: absolute; inset: 0; background: rgba(0,0,0,.72); backdrop-filter: blur(2px);
}
.audit-modal-box {
  position: relative; z-index: 1; width: min(92vw, 980px);
  background: var(--s1); border: 1.5px solid var(--border2);
  border-radius: 14px; padding: 20px 22px 18px; display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 24px 60px rgba(0,0,0,.6);
}
.audit-modal-header {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.audit-modal-title { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
.audit-modal-sub   { font-size: 11px; color: var(--text3); margin-top: 4px; }
.audit-modal-close {
  font-size: 14px; padding: 4px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--s2); color: var(--text2);
  cursor: pointer; flex-shrink: 0;
}
.audit-modal-close:hover { border-color: var(--red-bd); color: var(--red); }
.audit-chart-el { height: 400px; background: #131722; border-radius: 8px; overflow: hidden; }
.audit-modal-meta {
  display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text2);
  padding: 8px 10px; background: var(--s2); border-radius: 8px;
}
.audit-modal-meta strong { font-weight: 700; }
</style>
</head>
<body class="dark">
<div id="alApp">

<div class="sticky-header" id="alHeader">
<div class="topbar">
  <div class="logo-box" style="background:linear-gradient(135deg,#10b981,#1847c2)">
    <svg viewBox="0 0 17 17" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12 L5 7 L8 9 L11 5 L14 7"/>
      <circle cx="14" cy="7" r="1.4" fill="#fff"/>
    </svg>
  </div>
  <div class="title-block">
    <div class="title">Entry Lens</div>
    <div class="sub">Macro × Range × Volatility × Yield/Hedge Z-Scores — where to actually enter, all pairs</div>
  </div>
  <div class="spacer"></div>
  <span class="upd">Forecast updated: <span id="alUpdated">—</span></span>
  <button class="dark-btn" id="alRefreshBtn" onclick="window._alRefresh()">↻ Refresh</button>
  <a href="vol-forecast.html" target="_blank" style="text-decoration:none"><button class="dark-btn" title="Vol &amp; Range Forecast" style="border-color:#4f7df0;color:#4f7df0">📐 Vol Forecast</button></a>
  <a href="#audit" style="text-decoration:none"><button class="dark-btn" style="border-color:#f39c12;color:#f39c12" title="Zone Audit — track whether levels were hit">📋 Zone Audit</button></a>
  <a href="index.html" style="text-decoration:none"><button class="dark-btn">← Dashboard</button></a>
</div>
<div class="status-bar">
  <div class="sdot" id="alSdot"></div>
  <div class="stxt" id="alStxt">Loading…</div>
</div>
</div>

<div class="al-summary" id="alSummary" style="display:none">
  <span class="al-summary-label">Filter</span>
  <button class="al-filter-btn active" data-filter="all"   onclick="window._alFilter('all')">All <span class="cnt" id="cnt-all">0</span></button>
  <button class="al-filter-btn"        data-filter="ACT"   onclick="window._alFilter('ACT')">🟢 Act <span class="cnt" id="cnt-ACT">0</span></button>
  <button class="al-filter-btn"        data-filter="WATCH" onclick="window._alFilter('WATCH')">🟡 Watch <span class="cnt" id="cnt-WATCH">0</span></button>
  <button class="al-filter-btn"        data-filter="WAIT"  onclick="window._alFilter('WAIT')">⚪ Wait <span class="cnt" id="cnt-WAIT">0</span></button>
  <button class="al-filter-btn"        data-filter="AVOID" onclick="window._alFilter('AVOID')">🔴 Avoid <span class="cnt" id="cnt-AVOID">0</span></button>
</div>

<div class="al-grid" id="alGrid"></div>
<div id="alDeepDive" style="display:none"></div>
<div id="alAudit"    style="display:none"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script type="module" src="./js/levels.js"></script>
</body>
</html>
