<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regime Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #0e1117;
  color: #d1d4dc;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  overflow: hidden;
}

/* ── Root layout ── */
.rv-root {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #0e1117;
}

/* ── Toolbar ── */
.rv-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  height: 46px;
  border-bottom: 1px solid #1c2133;
  background: #131722;
  flex-shrink: 0;
  overflow: hidden;
}

.rv-title {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: #d1d4dc;
  white-space: nowrap;
  margin-right: 4px;
  min-width: 0;
}

.rv-sep {
  width: 1px;
  height: 20px;
  background: #1c2133;
  flex-shrink: 0;
}

.rv-lbl {
  font-size: 11px;
  color: #5a6380;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

.rv-toggle {
  display: flex;
  gap: 0;
  border: 1px solid #2a3348;
  border-radius: 4px;
  overflow: hidden;
}

.rv-toggle-btn {
  background: #1c2133;
  border: none;
  color: #7a88a8;
  padding: 4px 12px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: background .15s, color .15s;
  outline: none;
}

.rv-toggle-btn:first-child {
  border-right: 1px solid #2a3348;
}

.rv-toggle-btn.active {
  background: #1e3a6b;
  color: #4f8ef0;
}

.rv-toggle-btn:hover:not(.active) {
  background: #242b42;
  color: #c8d0e0;
}

.rv-sel {
  background: #1c2133;
  border: 1px solid #2a3348;
  color: #c8d0e0;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  outline: none;
}

.rv-sel:focus { border-color: #4f7df0; }

.rv-date-input {
  background: #1c2133;
  border: 1px solid #2a3348;
  color: #c8d0e0;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  outline: none;
  color-scheme: dark;
}

.rv-date-input:focus { border-color: #4f7df0; }

.rv-load-btn {
  background: #2962ff;
  border: 1px solid #2962ff;
  color: #fff;
  border-radius: 4px;
  padding: 4px 14px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
  outline: none;
}

.rv-load-btn:hover { background: #3d77ff; }
.rv-load-btn:active { background: #1a52e8; }

.rv-status {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #5a6380;
  margin-left: auto;
  white-space: nowrap;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rv-status.loading { color: #f0a030; }
.rv-status.ok { color: #00c97d; }
.rv-status.err { color: #ef5350; }

/* ── Main area ── */
.rv-main {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── Chart wrap ── */
.rv-chart-wrap {
  flex: 6;
  min-height: 0;
  position: relative;
  background: #131722;
  border-bottom: 1px solid #1c2133;
}

#priceChart {
  width: 100%;
  height: 100%;
  position: relative;
}

/* ── Hover info box ── */
.rv-hover-box {
  position: absolute;
  top: 8px;
  right: 56px;
  background: #131722cc;
  border: 1px solid #1c2133;
  border-radius: 4px;
  padding: 6px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #d1d4dc;
  pointer-events: none;
  z-index: 10;
  min-width: 130px;
  backdrop-filter: blur(4px);
}

.rv-hover-box .hb-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  line-height: 1.6;
}

.rv-hover-box .hb-key { color: #5a6380; }
.rv-hover-box .hb-val { color: #d1d4dc; font-weight: 500; }

.rv-hover-box .hb-regime-BULL { color: #00c97d; }
.rv-hover-box .hb-regime-BEAR { color: #ef5350; }
.rv-hover-box .hb-regime-RANGE { color: #f0a030; }
.rv-hover-box .hb-regime-CHOP { color: #888888; }

/* ── Metrics panel ── */
.rv-metrics-wrap {
  flex: 4;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: #0e1117;
}

.rv-metrics-cb-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px 12px;
  padding: 5px 12px;
  border-bottom: 1px solid #1c2133;
  background: #131722;
  flex-shrink: 0;
}

.rv-cb-item {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  user-select: none;
}

.rv-cb-item input[type=checkbox] {
  accent-color: currentColor;
  width: 13px;
  height: 13px;
  cursor: pointer;
}

.rv-cb-item label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  cursor: pointer;
}

/* ── Metrics grid: one mini-chart per metric ── */
#metricsGrid {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.metric-panel {
  flex: 1;
  min-height: 44px;
  position: relative;
  border-bottom: 1px solid #1c2133;
  background: #0e1117;
}

.metric-panel-lbl {
  position: absolute;
  top: 3px;
  left: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  pointer-events: none;
  z-index: 2;
  background: rgba(14,17,23,0.75);
  padding: 1px 4px;
  border-radius: 2px;
}

.metric-panel-chart {
  width: 100%;
  height: 100%;
  position: relative;
}
</style>
</head>
<body>
<div class="rv-root">

  <!-- Toolbar -->
  <div class="rv-topbar">
    <span class="rv-title">Regime Viewer</span>
    <div class="rv-sep"></div>

    <span class="rv-lbl">Bot</span>
    <div class="rv-toggle">
      <button class="rv-toggle-btn" id="btnV1" onclick="selectBot('v1')">V1</button>
      <button class="rv-toggle-btn active" id="btnV2" onclick="selectBot('v2')">V2</button>
    </div>

    <div class="rv-sep"></div>

    <span class="rv-lbl">Pair</span>
    <select class="rv-sel" id="pairSel">
      <option value="EUR/USD">EUR/USD</option>
      <option value="GBP/USD">GBP/USD</option>
      <option value="USD/JPY">USD/JPY</option>
      <option value="AUD/USD">AUD/USD</option>
      <option value="NZD/USD">NZD/USD</option>
      <option value="USD/CAD">USD/CAD</option>
      <option value="USD/CHF">USD/CHF</option>
      <option value="GBP/JPY">GBP/JPY</option>
      <option value="XAU/USD">XAU/USD</option>
      <option value="NAS100_USD">NAS100_USD</option>
    </select>

    <div class="rv-sep"></div>

    <span class="rv-lbl">From</span>
    <input type="date" class="rv-date-input" id="fromDate">
    <span class="rv-lbl">To</span>
    <input type="date" class="rv-date-input" id="toDate">

    <div class="rv-sep"></div>

    <button class="rv-load-btn" id="loadBtn" onclick="loadData()">Load</button>

    <div class="rv-sep"></div>

    <button class="rv-load-btn" id="backfillBtn" onclick="triggerBackfill()" style="background:#1c2133;border-color:#f0a030;color:#f0a030" title="Parse bot log files on the server and upload all historical regime data to KV">Backfill logs</button>

    <span class="rv-status" id="statusText">Ready</span>
  </div>

  <!-- Main area: chart + metrics -->
  <div class="rv-main">

    <!-- Price chart -->
    <div class="rv-chart-wrap" id="chartWrap">
      <div id="priceChart"></div>
      <div class="rv-hover-box" id="hoverBox" style="display:none">
        <div class="hb-row"><span class="hb-key">Regime</span><span class="hb-val" id="hbRegime">—</span></div>
        <div class="hb-row"><span class="hb-key">Conf</span><span class="hb-val" id="hbConf">—</span></div>
        <div class="hb-row"><span class="hb-key">Score</span><span class="hb-val" id="hbScore">—</span></div>
      </div>
    </div>

    <!-- Metrics panel -->
    <div class="rv-metrics-wrap">
      <div class="rv-metrics-cb-row" id="cbRow"></div>
      <div id="metricsGrid"></div>
    </div>

  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────

const REGIME_COLORS = {
  BULL:  { color: '#00c97d', wickColor: '#00c97d', borderColor: '#00c97d' },
  BEAR:  { color: '#ef5350', wickColor: '#ef5350', borderColor: '#ef5350' },
  RANGE: { color: '#f0a030', wickColor: '#f0a030', borderColor: '#f0a030' },
  CHOP:  { color: '#888888', wickColor: '#888888', borderColor: '#888888' },
};

const GREY_CANDLE = { color: '#888888', wickColor: '#888888', borderColor: '#888888' };

const PAIR_SAFE = {
  'EUR/USD':    'eurusd',
  'GBP/USD':    'gbpusd',
  'USD/JPY':    'usdjpy',
  'AUD/USD':    'audusd',
  'NZD/USD':    'nzdusd',
  'USD/CAD':    'usdcad',
  'USD/CHF':    'usdchf',
  'GBP/JPY':    'gbpjpy',
  'XAU/USD':    'xauusd',
  'NAS100_USD': 'nas100usd',
};

// scale:'right' = percentage metrics (0-100, share right axis)
// scale:'left'  = signal metrics (raw units, auto-scale on left axis)
const V2_METRICS = [
  { key: 'conf',  label: 'conf',  color: '#2196f3', scale: 'right' },
  { key: 'score', label: 'score', color: '#4caf50', scale: 'right' },
  { key: 'bocpd', label: 'bocpd', color: '#ff5722', scale: 'right' },
  { key: 'rl',    label: 'rl',    color: '#9c27b0', scale: 'right' },
  { key: 'slope', label: 'slope', color: '#00bcd4', scale: 'left'  },
  { key: 'vz',    label: 'vz',    color: '#ff9800', scale: 'left'  },
  { key: 'exh',   label: 'exh',   color: '#795548', scale: 'left'  },
  { key: 'decay', label: 'decay', color: '#f44336', scale: 'left'  },
];

const V1_METRICS = [
  { key: 'conf',  label: 'conf',  color: '#2196f3', scale: 'right' },
  { key: 'rl',    label: 'rl',    color: '#9c27b0', scale: 'right' },
  { key: 'vz',    label: 'vz',    color: '#ff9800', scale: 'left'  },
  { key: 'decay', label: 'decay', color: '#f44336', scale: 'left'  },
];

// ─── State ───────────────────────────────────────────────────────────────────

let currentBot = 'v2';
let chart1 = null;
let candleSeries = null;
let metricCharts = {};  // key → { chart, series }
let regimeRecords = [];
let activeMetrics = V2_METRICS;

let currentCandles = [];
let currentTrades  = [];
let overlayCanvas  = null;
let _drawPending   = false;

// ─── Init ────────────────────────────────────────────────────────────────────

(function init() {
  const today = new Date();
  const fromDate = new Date(today);
  fromDate.setDate(today.getDate() - 7);

  document.getElementById('toDate').value   = fmtDate(today);
  document.getElementById('fromDate').value = fmtDate(fromDate);

  buildCharts();
  buildCheckboxes();
})();

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function toEpoch(dateStr) {
  return Math.floor(new Date(dateStr + 'T00:00:00Z').getTime() / 1000);
}

// ─── Bot selector ────────────────────────────────────────────────────────────

function selectBot(bot) {
  currentBot = bot;
  document.getElementById('btnV1').classList.toggle('active', bot === 'v1');
  document.getElementById('btnV2').classList.toggle('active', bot === 'v2');
  activeMetrics = bot === 'v1' ? V1_METRICS : V2_METRICS;
  buildCheckboxes();
  rebuildMetricSeries();
}

// ─── Chart creation ──────────────────────────────────────────────────────────

function buildCharts() {
  const priceEl = document.getElementById('priceChart');

  // Overlay canvas BEFORE createChart so LC canvases land on top via DOM order.
  setupOverlay();

  chart1 = LightweightCharts.createChart(priceEl, {
    autoSize: true,
    layout: {
      background: { color: 'rgba(0,0,0,0)' },
      textColor:  '#d1d4dc',
    },
    grid: {
      vertLines: { color: '#1c2133' },
      horzLines: { color: '#1c2133' },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#1c2133' },
    timeScale: {
      borderColor:    '#1c2133',
      timeVisible:    true,
      secondsVisible: false,
    },
    handleScroll: true,
    handleScale:  true,
  });

  candleSeries = chart1.addCandlestickSeries({
    upColor:         '#00c97d',
    downColor:       '#ef5350',
    borderUpColor:   '#00c97d',
    borderDownColor: '#ef5350',
    wickUpColor:     '#00c97d',
    wickDownColor:   '#ef5350',
  });

  // One-way sync: price chart drives all metric mini-charts.
  chart1.timeScale().subscribeVisibleTimeRangeChange(range => {
    requestDraw();
    if (!range || range.from == null || range.to == null) return;
    Object.values(metricCharts).forEach(({ chart }) => {
      try { chart.timeScale().setVisibleRange(range); } catch(e) {}
    });
  });

  chart1.subscribeCrosshairMove(param => updateHoverBox(param));

  const ro = new ResizeObserver(() => {
    requestDraw();
  });
  ro.observe(priceEl);
}

// ─── Hover box ───────────────────────────────────────────────────────────────

function updateHoverBox(param) {
  const box = document.getElementById('hoverBox');
  if (!param || !param.time || !param.seriesData) {
    box.style.display = 'none';
    return;
  }

  const ts = typeof param.time === 'object'
    ? Date.UTC(param.time.year, param.time.month - 1, param.time.day) / 1000
    : param.time;

  const rec = findRegimeAt(ts);

  if (!rec) {
    box.style.display = 'none';
    return;
  }

  box.style.display = 'block';

  const regime = rec.regime || '—';
  const conf   = rec.conf   != null ? Number(rec.conf).toFixed(1)  : '—';
  const score  = rec.score  != null ? Number(rec.score).toFixed(1) : '—';

  const regEl = document.getElementById('hbRegime');
  regEl.textContent = regime;
  regEl.className   = 'hb-val hb-regime-' + regime;

  document.getElementById('hbConf').textContent  = conf;
  document.getElementById('hbScore').textContent = score;
}

// ─── Checkbox row ────────────────────────────────────────────────────────────

function buildCheckboxes() {
  const row = document.getElementById('cbRow');
  row.innerHTML = '';

  activeMetrics.forEach(m => {
    const item = document.createElement('div');
    item.className = 'rv-cb-item';
    item.style.color = m.color;

    const cb = document.createElement('input');
    cb.type    = 'checkbox';
    cb.id      = 'cb_' + m.key;
    cb.checked = true;
    cb.addEventListener('change', () => toggleMetric(m.key, cb.checked));

    const lbl = document.createElement('label');
    lbl.htmlFor   = 'cb_' + m.key;
    lbl.textContent = m.label;
    lbl.style.color = m.color;

    item.appendChild(cb);
    item.appendChild(lbl);
    row.appendChild(item);
  });
}

// ─── Metric series management ────────────────────────────────────────────────

function rebuildMetricSeries() {
  // Destroy existing mini-charts and clear the grid
  Object.values(metricCharts).forEach(({ chart }) => {
    try { chart.remove(); } catch(e) {}
  });
  metricCharts = {};

  const grid = document.getElementById('metricsGrid');
  grid.innerHTML = '';

  activeMetrics.forEach(m => {
    const cb = document.getElementById('cb_' + m.key);
    const hidden = cb && !cb.checked;

    const panel = document.createElement('div');
    panel.className = 'metric-panel';
    panel.id = 'panel_' + m.key;
    if (hidden) panel.style.display = 'none';

    const lbl = document.createElement('div');
    lbl.className  = 'metric-panel-lbl';
    lbl.textContent = m.label;
    lbl.style.color = m.color;

    const chartEl = document.createElement('div');
    chartEl.className = 'metric-panel-chart';

    panel.appendChild(lbl);
    panel.appendChild(chartEl);
    grid.appendChild(panel);

    const chart = LightweightCharts.createChart(chartEl, {
      autoSize: true,
      layout: {
        background: { color: '#0e1117' },
        textColor:  '#5a6380',
      },
      grid: {
        vertLines: { color: '#1c2133' },
        horzLines: { color: '#1c2133' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: {
        borderColor:   '#1c2133',
        scaleMargins:  { top: 0.1, bottom: 0.1 },
      },
      timeScale: {
        borderColor:    '#1c2133',
        visible:        false,  // hide time-axis row — saves vertical space
      },
      handleScroll: false,
      handleScale:  false,
    });

    const series = chart.addLineSeries({
      color:                  m.color,
      lineWidth:              1,
      priceLineVisible:       false,
      lastValueVisible:       true,
      crosshairMarkerVisible: true,
    });

    metricCharts[m.key] = { chart, series };
  });
}

function toggleMetric(key, visible) {
  const panel = document.getElementById('panel_' + key);
  if (panel) panel.style.display = visible ? '' : 'none';
}

// ─── Utility: binary search ───────────────────────────────────────────────────

function findRegimeAt(ts) {
  if (!regimeRecords.length) return null;
  let lo = 0, hi = regimeRecords.length - 1;
  let result = null;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (regimeRecords[mid].ts <= ts) {
      result = regimeRecords[mid];
      lo = mid + 1;
    } else {
      hi = mid - 1;
    }
  }
  return result;
}

// ─── Overlay: regime bands + trade lines ─────────────────────────────────────

function setupOverlay() {
  const priceEl = document.getElementById('priceChart');
  overlayCanvas = document.createElement('canvas');
  overlayCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
  priceEl.appendChild(overlayCanvas);
}

function requestDraw() {
  if (_drawPending) return;
  _drawPending = true;
  requestAnimationFrame(() => { _drawPending = false; drawOverlay(); });
}

function buildTradePairs(events) {
  const trades = [];
  let pending = null;
  [...events].sort((a, b) => a.ts - b.ts).forEach(ev => {
    if (ev.type === 'entry') {
      pending = ev;
    } else if (ev.type === 'close' && pending) {
      trades.push({ entry: pending, close: ev, direction: pending.direction });
      pending = null;
    }
  });
  return trades;
}

function lookupCandleClose(ts) {
  if (!currentCandles.length) return null;
  let lo = 0, hi = currentCandles.length - 1, result = null;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (currentCandles[mid].time <= ts) { result = currentCandles[mid]; lo = mid + 1; }
    else hi = mid - 1;
  }
  return result ? result.close : null;
}

function drawOverlay() {
  if (!chart1) return;

  // ── Price chart: trade connecting lines only (regime shown via candle colour) ──
  if (overlayCanvas) {
    const priceEl = document.getElementById('priceChart');
    const W = priceEl.clientWidth;
    const H = priceEl.clientHeight;
    overlayCanvas.width  = W;
    overlayCanvas.height = H;
    const ctx = overlayCanvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    if (currentTrades.length && candleSeries) {
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 4]);
      currentTrades.forEach(trade => {
        const x1 = chart1.timeScale().timeToCoordinate(trade.entry.ts);
        const x2 = chart1.timeScale().timeToCoordinate(trade.close.ts);
        if (x1 === null || x2 === null) return;
        const entryPrice = lookupCandleClose(trade.entry.ts);
        const closePrice = lookupCandleClose(trade.close.ts);
        if (entryPrice === null || closePrice === null) return;
        const y1 = candleSeries.priceToCoordinate(entryPrice);
        const y2 = candleSeries.priceToCoordinate(closePrice);
        if (y1 === null || y2 === null) return;
        const isLong = (trade.direction || '').toUpperCase() === 'LONG';
        ctx.strokeStyle = isLong ? 'rgba(0,201,125,0.80)' : 'rgba(239,83,80,0.80)';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      });
      ctx.setLineDash([]);
    }
  }

}

// ─── Data loading ─────────────────────────────────────────────────────────────

async function loadData() {
  const pair    = document.getElementById('pairSel').value;
  const fromStr = document.getElementById('fromDate').value;
  const toStr   = document.getElementById('toDate').value;

  if (!fromStr || !toStr) {
    setStatus('Please select a date range', 'err');
    return;
  }

  const days = (new Date(toStr) - new Date(fromStr)) / 86400000;
  if (days > 90) {
    setStatus('Max 90 days — M5 candles beyond that crash the browser. Narrow your range.', 'err');
    return;
  }

  const fromEpoch = toEpoch(fromStr);
  const toEpoch2  = toEpoch(toStr) + 86400; // include full to-day

  setStatus('Loading…', 'loading');
  document.getElementById('loadBtn').disabled = true;

  try {
    const pairSafe = PAIR_SAFE[pair] || pair.toLowerCase().replace('/', '').replace('_', '');
    const pairEnc  = encodeURIComponent(pair);

    // Fetch candles + regime data in parallel.
    // Regime data: load static backfill file (committed JSON) + KV live ring buffer,
    // then merge so backfill covers history and KV covers recent hours.
    const staticUrl = `/data/regime_history/${currentBot}/${pairSafe}.json`;
    const kvUrl     = `/api/regime-history?bot=${currentBot}&pair=${pairSafe}&from=${fromEpoch}&to=${toEpoch2}`;

    const [candlesRes, staticRes, kvRes] = await Promise.all([
      fetch(`/api/regime-candles?pair=${pairEnc}&from=${fromStr}&to=${toStr}`),
      fetch(staticUrl).catch(() => null),
      fetch(kvUrl).catch(() => null),
    ]);

    // Handle candles
    if (!candlesRes.ok) {
      throw new Error(`Candles API error ${candlesRes.status}`);
    }
    const candles = await candlesRes.json();

    // Merge regime records from both sources, dedup by ts, filter to range
    let records = [], events = [];
    const mergedRecs = new Map();
    const mergedEvts = new Map();

    const ingestData = (data) => {
      for (const r of (data.records || [])) mergedRecs.set(r.ts, r);
      for (const e of (data.events  || [])) mergedEvts.set(`${e.ts}_${e.type}_${e.pair||''}`, e);
    };

    if (staticRes && staticRes.ok) {
      try { ingestData(await staticRes.json()); } catch {}
    }
    if (kvRes && kvRes.ok) {
      try { ingestData(await kvRes.json()); } catch {}
    }

    records = [...mergedRecs.values()]
      .filter(r => r.ts >= fromEpoch && r.ts <= toEpoch2)
      .sort((a, b) => a.ts - b.ts);
    events = [...mergedEvts.values()]
      .filter(e => e.ts >= fromEpoch && e.ts <= toEpoch2)
      .sort((a, b) => a.ts - b.ts);

    if (!Array.isArray(candles) || candles.length === 0) {
      setStatus('No data for selected range', 'err');
      document.getElementById('loadBtn').disabled = false;
      return;
    }

    regimeRecords = records;

    renderCandles(candles);
    renderMarkers(events);
    renderMetrics(records);

    currentTrades = buildTradePairs(events);

    const targetRange = { from: fromEpoch, to: toEpoch2 };
    try { chart1.timeScale().setVisibleRange(targetRange); } catch(e) {}
    Object.values(metricCharts).forEach(({ chart }) => {
      try { chart.timeScale().setVisibleRange(targetRange); } catch(e) {}
    });

    requestDraw();

    const srcInfo = staticRes?.ok ? 'file+live' : 'live only';
    setStatus(`Loaded ${candles.length} candles · ${records.length} regime records · ${events.length} events (${srcInfo})`, 'ok');
  } catch (err) {
    setStatus(`Error: ${err.message}`, 'err');
    console.error(err);
  }

  document.getElementById('loadBtn').disabled = false;
}

// ─── Render candles ───────────────────────────────────────────────────────────

function renderCandles(candles) {
  candles.sort((a, b) => a.time - b.time);
  currentCandles = candles;

  // Colour each candle by the active regime at that timestamp.
  // Falls back to standard green/red when no regime data is available.
  const data = candles.map(c => {
    const rec = findRegimeAt(c.time);
    const col = rec ? REGIME_COLORS[rec.regime]?.color : null;
    const fallback = c.close >= c.open ? '#00c97d' : '#ef5350';
    const color = col || fallback;
    return {
      time:  c.time,
      open:  c.open,
      high:  c.high,
      low:   c.low,
      close: c.close,
      color,
      wickColor:   color,
      borderColor: color,
    };
  });

  candleSeries.setData(data);
  chart1.timeScale().fitContent();
}

// ─── Render markers ───────────────────────────────────────────────────────────

function renderMarkers(events) {
  if (!events || !events.length) {
    candleSeries.setMarkers([]);
    return;
  }

  const markers = [];

  events.forEach(ev => {
    if (!ev || !ev.ts) return;
    const ts = ev.ts;

    if (ev.type === 'entry') {
      const isLong = (ev.direction || '').toUpperCase() === 'LONG';
      markers.push({
        time:     ts,
        position: isLong ? 'belowBar' : 'aboveBar',
        color:    isLong ? '#00c97d' : '#ef5350',
        shape:    isLong ? 'arrowUp' : 'arrowDown',
        text:     isLong ? 'L' : 'S',
      });
    }
    // close events omitted — connecting lines already show trade exits
    // gate events omitted — too numerous (fires on every blocked cycle)
  });

  // LightweightCharts requires markers sorted by time
  markers.sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(markers);
}

// ─── Render metrics ───────────────────────────────────────────────────────────

function renderMetrics(records) {
  rebuildMetricSeries();

  if (!records.length) return;

  // Each metric has its own mini-chart with an auto-scaling y-axis,
  // so we plot raw values directly — no normalisation needed.
  activeMetrics.forEach(m => {
    const mc = metricCharts[m.key];
    if (!mc) return;

    const seen = new Map();
    records.forEach(rec => {
      if (rec.ts == null) return;
      const raw = rec[m.key];
      if (raw == null) return;
      const v = Number(raw);
      if (!isNaN(v)) seen.set(rec.ts, v);
    });

    const data = [...seen.entries()]
      .sort((a, b) => a[0] - b[0])
      .map(([time, value]) => ({ time, value }));

    mc.series.setData(data);
  });
}

// ─── Status helper ────────────────────────────────────────────────────────────

function setStatus(msg, cls) {
  const el = document.getElementById('statusText');
  el.textContent = msg;
  el.className = 'rv-status' + (cls ? ' ' + cls : '');
}

// ─── Backfill from server logs ───────────────────────────────────────────────

async function triggerBackfill() {
  const btn = document.getElementById('backfillBtn');
  btn.disabled = true;
  setStatus('Starting backfill…', 'loading');

  let jobId;
  try {
    const r = await fetch('/api/regime-backfill-trigger', { method: 'POST' });
    const d = await r.json();
    if (!d.ok) { setStatus('Backfill error: ' + (d.error || 'unknown'), 'err'); btn.disabled = false; return; }
    jobId = d.jobId;
    if (d.alreadyRunning) setStatus('Backfill already running…', 'loading');
  } catch(e) {
    setStatus('Backfill failed: ' + e.message, 'err');
    btn.disabled = false;
    return;
  }

  // Poll for completion
  const poll = setInterval(async () => {
    try {
      const r = await fetch(`/api/regime-backfill-status/${jobId}`);
      const d = await r.json();
      const lines = d.lines || [];
      const last  = lines.length ? lines[lines.length - 1] : '';
      if (d.status === 'running') {
        setStatus(`Backfill running (${d.elapsed}s)… ${last}`, 'loading');
      } else if (d.status === 'done') {
        clearInterval(poll);
        btn.disabled = false;
        setStatus(`Backfill complete (${d.elapsed}s) — reload to see regime colours`, 'ok');
      } else {
        clearInterval(poll);
        btn.disabled = false;
        const errDetail = lines.slice(-5).join(' | ') || `exit ${d.exitCode ?? '?'}`;
        setStatus('Backfill error: ' + errDetail, 'err');
      }
    } catch(e) {
      clearInterval(poll);
      btn.disabled = false;
      setStatus('Backfill poll error: ' + e.message, 'err');
    }
  }, 3000);
}

// ─── Initial metric series creation ──────────────────────────────────────────
// Called once after charts are built so metric series exist on first load
rebuildMetricSeries();
</script>
