<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backtest Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #0e1117;
  color: #d1d4dc;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  overflow: hidden;
}

/* ── Root layout ──────────────────────────────────────────────────────────── */
.bv-root {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #0e1117;
}

/* ── Top toolbar ──────────────────────────────────────────────────────────── */
.bv-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  height: 46px;
  border-bottom: 1px solid #1c2133;
  background: #131722;
  flex-shrink: 0;
  overflow: hidden;
}

.bv-title {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: #d1d4dc;
  white-space: nowrap;
  margin-right: 4px;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bv-ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.bv-lbl {
  font-size: 11px;
  color: #5a6380;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

.bv-sel {
  background: #1c2133;
  border: 1px solid #2a3348;
  color: #c8d0e0;
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  outline: none;
}
.bv-sel:focus { border-color: #4f7df0; }

.bv-btn {
  background: #1c2133;
  border: 1px solid #2a3348;
  color: #9aa8c0;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
  white-space: nowrap;
}
.bv-btn:hover   { background: #242b42; color: #d1d4dc; }
.bv-btn.bv-active {
  background: #2563eb22;
  border-color: #4f7df0;
  color: #4f7df0;
}
.bv-btn.bv-sm { padding: 3px 8px; }

.bv-stat {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #5a6380;
  margin-left: auto;
  white-space: nowrap;
}

/* ── Body ─────────────────────────────────────────────────────────────────── */
.bv-body {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}

/* ── Chart area ───────────────────────────────────────────────────────────── */
.bv-chart-wrap {
  flex: 1;
  position: relative;
  min-width: 0;
}

#bvTvChart {
  position: absolute;
  inset: 0;
}

.bv-chart-veil {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #131722cc;
  color: #5a6380;
  font-size: 13px;
  gap: 12px;
  pointer-events: none;
  z-index: 10;
}

.bv-spinner {
  width: 22px;
  height: 22px;
  border: 2px solid #2a3348;
  border-top-color: #4f7df0;
  border-radius: 50%;
  animation: bv-spin .7s linear infinite;
}
@keyframes bv-spin { to { transform: rotate(360deg); } }

/* ── Panel backdrop (mobile overlay) ─────────────────────────────────────── */
.bv-panel-backdrop {
  display: none;
}

/* ── Right panel ──────────────────────────────────────────────────────────── */
.bv-panel {
  width: 268px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #1c2133;
  background: #131722;
  overflow: hidden;
}

/* Mobile-only panel header — hidden on desktop */
.bv-panel-mobile-hdr {
  display: none;
}

/* Trade detail card */
.bv-detail-card {
  border-bottom: 1px solid #1c2133;
  flex-shrink: 0;
}

.bv-panel-hdr {
  padding: 8px 12px 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  color: #5a6380;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
  border-bottom: 1px solid #1c2133;
}

.bv-detail-body {
  padding: 6px 10px 8px;
}

.bv-no-trade {
  font-size: 12px;
  color: #3a4255;
  padding: 6px 0;
}

.bv-dr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 0;
  border-bottom: 1px solid #1c2133;
  min-height: 22px;
}
.bv-dr:last-child { border-bottom: none; }

.bv-dl {
  font-size: 10px;
  color: #5a6380;
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
  padding-right: 6px;
}

.bv-dv {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: #c8d0e0;
  text-align: right;
}

.bv-green { color: #26a69a !important; }
.bv-red   { color: #ef5350 !important; }
.bv-amber { color: #fbbf24 !important; }

/* Badges */
.bv-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
}
.bv-badge.buy      { background: #26a69a22; color: #26a69a; border: 1px solid #26a69a44; }
.bv-badge.sell     { background: #ef535022; color: #ef5350; border: 1px solid #ef535044; }
.bv-badge.rg-bull  { background: #26a69a22; color: #26a69a; border: 1px solid #26a69a44; }
.bv-badge.rg-bear  { background: #ef535022; color: #ef5350; border: 1px solid #ef535044; }
.bv-badge.rg-range { background: #4f7df022; color: #4f7df0; border: 1px solid #4f7df044; }

/* ── Trade list ───────────────────────────────────────────────────────────── */
.bv-list-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  font-size: 10px;
  color: #5a6380;
  font-family: 'DM Mono', monospace;
  border-bottom: 1px solid #1c2133;
  flex-shrink: 0;
}

.bv-nav-btns { display: flex; gap: 4px; }

.bv-list {
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: #2a3348 transparent;
}
.bv-list::-webkit-scrollbar       { width: 5px; }
.bv-list::-webkit-scrollbar-thumb { background: #2a3348; border-radius: 4px; }

.bv-row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-bottom: 1px solid #0e1117;
  cursor: pointer;
  transition: background .1s;
  user-select: none;
  flex-wrap: nowrap;
  overflow: hidden;
}
.bv-row:hover     { background: #1c2133; }
.bv-row.bv-selected { background: #1c2840; border-left: 2px solid #4f7df0; padding-left: 8px; }

.bv-row-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #6a7892;
  white-space: nowrap;
  flex-shrink: 0;
  width: 72px;
}

.bv-row-px {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #9aa8c0;
  flex: 1;
  text-align: right;
  white-space: nowrap;
}

.bv-outcome {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  padding: 1px 4px;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}
.bv-outcome.win  { color: #26a69a; background: #26a69a1a; }
.bv-outcome.loss { color: #ef5350; background: #ef53501a; }
.bv-outcome.open { color: #fbbf24; background: #fbbf241a; }

.bv-row-pnl {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 44px;
  text-align: right;
}

/* ── Mobile bottom bar (hidden on desktop) ────────────────────────────────── */
.bv-mobile-bar {
  display: none;
}

/* ── Keyboard hints (desktop only) ───────────────────────────────────────── */
.bv-hints {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #3a4255;
  pointer-events: none;
  white-space: nowrap;
}

/* ════════════════════════════════════════════════════════════════════════════
   MOBILE  ≤ 768px
   ════════════════════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {

  /* Topbar: slimmer, no overflow clip */
  .bv-topbar {
    gap: 8px;
    padding: 0 10px;
    overflow: visible;
    flex-wrap: wrap;
    height: auto;
    min-height: 46px;
    padding-top: 6px;
    padding-bottom: 6px;
  }

  /* Hide desktop-only topbar controls (they move into the panel) */
  #bvLevels,
  #bvReCenter,
  #bvStat {
    display: none;
  }

  /* ── Panel becomes a right-side slide-in drawer ── */
  .bv-panel {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    z-index: 200;
    width: 88%;
    max-width: 320px;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -8px 0 32px rgba(0, 0, 0, 0.65);
    border-left: 1px solid #2a3348;
  }

  .bv-panel.bv-panel-open {
    transform: translateX(0);
  }

  /* ── Backdrop dims chart while panel is open ── */
  .bv-panel-backdrop {
    display: block;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 199;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }
  .bv-panel-backdrop.bv-visible {
    opacity: 1;
    pointer-events: auto;
    cursor: pointer;
  }

  /* ── Mobile panel header (visible only on mobile) ── */
  .bv-panel-mobile-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    height: 44px;
    flex-shrink: 0;
    border-bottom: 1px solid #1c2133;
    background: #0e1520;
  }

  .bv-panel-mobile-hdr-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    color: #5a6380;
    text-transform: uppercase;
  }

  .bv-panel-mobile-hdr-actions {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  /* ── Bottom action bar ── */
  .bv-mobile-bar {
    display: flex;
    align-items: center;
    height: 52px;
    padding: 0 12px;
    gap: 8px;
    border-top: 1px solid #1c2133;
    background: #131722;
    flex-shrink: 0;
  }

  .bv-mob-btn {
    background: #1c2133;
    border: 1px solid #2a3348;
    color: #9aa8c0;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: background .15s, color .15s;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }
  .bv-mob-btn:active { background: #242b42; }

  .bv-mob-nav {
    width: 44px;
    flex-shrink: 0;
    font-size: 18px;
    color: #6a7892;
    border-color: #1c2133;
  }
  .bv-mob-nav:active { color: #d1d4dc; background: #242b42; }

  .bv-mob-panel-btn {
    flex: 1;
    gap: 7px;
    font-size: 12px;
    padding: 0 10px;
    color: #c8d0e0;
    border-color: #2a3348;
  }
  .bv-mob-panel-btn .bv-mob-icon {
    font-size: 15px;
    line-height: 1;
    color: #4f7df0;
  }
  .bv-mob-panel-btn .bv-mob-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Hints hidden on mobile */
  .bv-hints { display: none; }
}
</style>
</head>
<body>

<div class="bv-root">

  <!-- Top toolbar -->
  <div class="bv-topbar" id="bvTopbar">
    <span class="bv-title" id="bvTitle">Backtest Viewer</span>
    <div class="bv-ctrl-group">
      <span class="bv-lbl">Result</span>
      <select class="bv-sel" id="bvFResult">
        <option value="">All</option>
        <option value="win">Win</option>
        <option value="loss">Loss</option>
        <option value="open">Open</option>
      </select>
    </div>
    <div class="bv-ctrl-group">
      <span class="bv-lbl">Dir</span>
      <select class="bv-sel" id="bvFDir">
        <option value="">All</option>
        <option value="BUY">Buy</option>
        <option value="SELL">Sell</option>
      </select>
    </div>
    <div class="bv-ctrl-group">
      <button class="bv-btn bv-active" id="bvLevels">Levels</button>
      <button class="bv-btn" id="bvReCenter">Re-center</button>
    </div>
    <span class="bv-stat" id="bvStat"></span>
  </div>

  <!-- Main body: chart + sliding panel -->
  <div class="bv-body">

    <!-- Chart fills all space not taken by the panel -->
    <div class="bv-chart-wrap">
      <div id="bvTvChart"></div>
      <div class="bv-chart-veil" id="bvVeil">
        <div class="bv-spinner" id="bvVeilSpinner" style="display:none"></div>
        <div id="bvVeilMsg">Loading trades…</div>
      </div>
    </div>

    <!-- Backdrop (mobile only) — tap to close panel -->
    <div class="bv-panel-backdrop" id="bvBackdrop"></div>

    <!-- Right panel: detail + trade list -->
    <div class="bv-panel" id="bvPanel">

      <!-- Mobile-only panel header -->
      <div class="bv-panel-mobile-hdr">
        <span class="bv-panel-mobile-hdr-title">Trades</span>
        <div class="bv-panel-mobile-hdr-actions">
          <button class="bv-btn bv-sm bv-active" id="bvPanelLevels">Levels</button>
          <button class="bv-btn bv-sm" id="bvPanelReCenter">Re-center</button>
          <button class="bv-btn bv-sm" id="bvClosePanel" style="padding:3px 10px;font-size:13px">✕</button>
        </div>
      </div>

      <!-- Trade detail card -->
      <div class="bv-detail-card">
        <div class="bv-panel-hdr">TRADE DETAIL</div>
        <div class="bv-detail-body" id="bvDetailBody">
          <div class="bv-no-trade">No trade selected</div>
        </div>
      </div>

      <!-- List header with prev/next nav -->
      <div class="bv-list-hdr">
        <span id="bvListCount">—</span>
        <div class="bv-nav-btns">
          <button class="bv-btn bv-sm" id="bvPrevBtn" title="Previous trade (←)">‹ Prev</button>
          <button class="bv-btn bv-sm" id="bvNextBtn" title="Next trade (→)">Next ›</button>
        </div>
      </div>
      <div class="bv-list" id="bvList"></div>
    </div>

  </div>

  <!-- Mobile bottom bar (hidden on desktop) -->
  <div class="bv-mobile-bar" id="bvMobileBar">
    <button class="bv-mob-btn bv-mob-nav" id="bvMobPrev" title="Previous trade">‹</button>
    <button class="bv-mob-btn bv-mob-panel-btn" id="bvMobToggle">
      <span class="bv-mob-icon">☰</span>
      <span class="bv-mob-label" id="bvMobLabel">Trades</span>
    </button>
    <button class="bv-mob-btn bv-mob-nav" id="bvMobNext" title="Next trade">›</button>
  </div>

  <!-- Keyboard shortcut hint (desktop only) -->
  <div class="bv-hints">← → Navigate &nbsp;·&nbsp; L Levels &nbsp;·&nbsp; Enter Re-center</div>

</div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────

function _toEpochSec(t) {
  const s = String(t).substring(0, 19).replace(' ', 'T');
  return Math.floor(new Date(s + 'Z').getTime() / 1000);
}

function _toTvSymbol(instrument) {
  return 'FX:' + instrument.toUpperCase().replace(/[^A-Z]/g, '');
}

function _isMobile() {
  return window.innerWidth <= 768;
}

// ── Vol Backtest Adapter ──────────────────────────────────────────────────────

const VOL_ADAPTER = {
  async fetchTrades() {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 30_000);
    try {
      const r = await fetch('/api/vol-backtest/trades', { signal: ctrl.signal });
      if (!r.ok) throw new Error(`HTTP ${r.status} — run the backtester first`);
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || 'Failed to load trades');
      if (!d.trades?.length) throw new Error('No trades found — run the backtester first');
      return d.trades;
    } catch (e) {
      if (e.name === 'AbortError') throw new Error('Request timed out — server may be starting up, try again');
      throw e;
    } finally {
      clearTimeout(tid);
    }
  },

  getLevels(trade) {
    const { open, hl_75_pct, oc_med_pct, side, regime } = trade;
    if (!open || !hl_75_pct || !oc_med_pct) return null;
    const hl     = open * hl_75_pct  / 100;
    const oc     = open * oc_med_pct / 100;
    const isSell = side === 'SELL';
    const isRng  = regime === 'RANGE';
    return {
      entry: isSell ? open + hl        : open - hl,
      tp:    isSell ? (isRng ? open : open + oc) : (isRng ? open : open - oc),
      sl:    isSell ? open + hl * 1.5  : open - hl * 1.5,
      hl75H: open + hl,
      hl75L: open - hl,
      ocH:   open + oc,
      ocL:   open - oc,
      open,
    };
  },

  getDetail(trade) {
    const asiaRange = (trade.asia_low != null && trade.asia_high != null)
      ? `${(+trade.asia_low).toFixed(5)} – ${(+trade.asia_high).toFixed(5)}`
      : '—';
    return {
      volRegime: trade.vol_regime || '—',
      asiaRange,
      sdLevel:   trade.hl_75_pct?.toFixed(2),
    };
  },
};

// ── Adapter registry ──────────────────────────────────────────────────────────

const ADAPTERS = {
  vol: VOL_ADAPTER,
  // claude: CLAUDE_ADAPTER,
  // gold:   GOLD_ADAPTER,
};

const BACK_LINKS = {
  vol:    { href: 'vol-backtest.html',    label: '← Vol' },
  claude: { href: 'claude-backtest.html', label: '← Claude' },
  gold:   { href: 'gold.html',            label: '← Gold' },
};

// ── App State ─────────────────────────────────────────────────────────────────

const source  = new URLSearchParams(location.search).get('source') || 'vol';
const adapter = ADAPTERS[source];

let allTrades    = [];
let filtTrades   = [];
let filtCapitals = [];
let currentIdx   = -1;
let currentTrade = null;
let fResult      = '';
let fDir         = '';
let showLevels   = true;
let panelOpen    = false;

// TradingView widget
let tvWidget     = null;
let tvReady      = false;
let tvSymbol     = '';
let orderLines   = [];
let shapeIds     = [];
let pendingTrade = null;

// ── Panel open / close ────────────────────────────────────────────────────────

function _openPanel() {
  if (!_isMobile()) return;
  panelOpen = true;
  document.getElementById('bvPanel').classList.add('bv-panel-open');
  document.getElementById('bvBackdrop').classList.add('bv-visible');
}

function _closePanel() {
  if (!_isMobile()) return;
  panelOpen = false;
  document.getElementById('bvPanel').classList.remove('bv-panel-open');
  document.getElementById('bvBackdrop').classList.remove('bv-visible');
}

function _togglePanel() {
  panelOpen ? _closePanel() : _openPanel();
}

// ── TradingView Widget ────────────────────────────────────────────────────────

function _initTV() {
  tvWidget = new TradingView.widget({
    container_id:        'bvTvChart',
    symbol:              'FX:EURUSD',
    interval:            '1',
    timezone:            'Etc/UTC',
    theme:               'dark',
    style:               '1',
    locale:              'en',
    toolbar_bg:          '#131722',
    autosize:            true,
    hide_top_toolbar:    false,
    enable_publishing:   false,
    allow_symbol_change: true,
    withdateranges:      true,
    studies:             [],
    disabled_features:   ['header_screenshot'],
    enabled_features:    [],
  });

  tvWidget.onChartReady(() => {
    tvReady = true;
    if (pendingTrade) {
      const t    = pendingTrade;
      pendingTrade = null;
      _applyTrade(t);
    }
  });
}

// ── Chart Annotations ─────────────────────────────────────────────────────────

function _getChart() {
  try { return tvWidget?.activeChart?.() || tvWidget?.chart?.(); } catch { return null; }
}

function _clearAnnotations() {
  const chart = _getChart();
  orderLines.forEach(l => { try { l.remove(); } catch {} });
  orderLines = [];
  if (chart) shapeIds.forEach(id => { try { chart.removeEntity(id); } catch {} });
  shapeIds = [];
}

function _addOrderLine(chart, price, color, label) {
  if (price == null) return;
  try {
    const l = chart.createOrderLine()
      .setPrice(price)
      .setQuantity('')
      .setText(label)
      .setLineColor(color)
      .setBodyBorderColor(color)
      .setBodyTextColor(color)
      .setBodyBackgroundColor('#0e1117');
    orderLines.push(l);
  } catch (e) { console.warn('createOrderLine:', e.message); }
}

function _addEntryShape(chart, trade, entryPrice) {
  if (!trade.fill_time) return;
  const isSell = trade.side === 'SELL';
  try {
    const id = chart.createShape(
      { time: _toEpochSec(trade.fill_time), price: entryPrice, channel: '' },
      {
        shape:     isSell ? 'arrow_down' : 'arrow_up',
        text:      `${trade.side} ${entryPrice.toFixed(5)}`,
        lock:      false,
        overrides: { color: isSell ? '#ef5350' : '#26a69a' },
      }
    );
    if (id != null) shapeIds.push(id);
  } catch (e) { console.warn('createShape:', e.message); }
}

function _applyAnnotations(trade) {
  const chart = _getChart();
  if (!chart) return;

  _clearAnnotations();

  const dayStart = _toEpochSec(trade.date + 'T00:00:00');
  try {
    chart.setVisibleRange(
      { from: dayStart - 3 * 3600, to: dayStart + 27 * 3600 },
      { applyDefaultRightMargin: false }
    );
  } catch {
    try { chart.setVisibleRange({ from: dayStart - 3 * 3600, to: dayStart + 27 * 3600 }); } catch {}
  }

  if (!showLevels) return;
  const lvl = adapter.getLevels(trade);
  if (!lvl) return;

  const isSell = trade.side === 'SELL';
  _addOrderLine(chart, lvl.entry, isSell ? '#ef5350' : '#26a69a', 'Entry');
  _addOrderLine(chart, lvl.tp,    '#26a69a',                       'TP');
  _addOrderLine(chart, lvl.sl,    '#ef5350',                       'SL');
  _addOrderLine(chart, lvl.hl75H, '#f59e0b',                       'HL75↑');
  _addOrderLine(chart, lvl.hl75L, '#f59e0b',                       'HL75↓');
  _addOrderLine(chart, lvl.ocH,   '#4f7df0',                       'OC↑');
  _addOrderLine(chart, lvl.ocL,   '#4f7df0',                       'OC↓');
  _addOrderLine(chart, lvl.open,  '#6b7280',                       'Open');
  _addEntryShape(chart, trade, lvl.entry);
}

function _applyTrade(trade) {
  if (!tvReady) { pendingTrade = trade; return; }

  const sym = _toTvSymbol(trade.instrument);
  if (sym !== tvSymbol) {
    tvSymbol = sym;
    try {
      tvWidget.setSymbol(sym, '1', () => setTimeout(() => _applyAnnotations(trade), 400));
    } catch {
      try { _getChart()?.setSymbol?.(sym, () => setTimeout(() => _applyAnnotations(trade), 400)); }
      catch { _applyAnnotations(trade); }
    }
  } else {
    _applyAnnotations(trade);
  }
}

function _reCenter() {
  if (!currentTrade || !tvReady) return;
  const dayStart = _toEpochSec(currentTrade.date + 'T00:00:00');
  try { _getChart()?.setVisibleRange({ from: dayStart - 3 * 3600, to: dayStart + 27 * 3600 }); } catch {}
}

// ── Data Loading ──────────────────────────────────────────────────────────────

async function _loadTrades() {
  _setVeil('Loading trades…', true);
  try {
    allTrades = await adapter.fetchTrades();
    _applyFilters();
    _setVeil('Select a trade →', false);
  } catch (e) {
    _setVeil('Error: ' + e.message, false);
  }
}

function _applyFilters() {
  filtTrades = allTrades.filter(t => {
    if (fResult && t.outcome !== fResult) return false;
    if (fDir    && t.side    !== fDir)    return false;
    return true;
  });
  let cap = 100000;
  filtCapitals = filtTrades.map(t => {
    cap = cap * (1 + (t.pnl_pct || 0) / 100);
    return Math.round(cap);
  });
  _renderList();
  _updateStats();
}

function _updateStats() {
  const n    = filtTrades.length;
  const wins = filtTrades.filter(t => t.outcome === 'win').length;
  const wr   = n ? (wins / n * 100).toFixed(1) : '—';
  const stat = `${n.toLocaleString()} trades · Win ${wr}%`;
  document.getElementById('bvStat').textContent = stat;

  // Mobile bar label
  const mobLabel = document.getElementById('bvMobLabel');
  if (mobLabel) {
    if (currentTrade) {
      const t = currentTrade;
      mobLabel.textContent = `${t.instrument.toUpperCase()} · ${t.side} · ${t.date}`;
    } else {
      mobLabel.textContent = stat;
    }
  }

  document.getElementById('bvListCount').textContent = `${n.toLocaleString()} trades`;
}

// ── Trade Selection ───────────────────────────────────────────────────────────

function _selectTrade(idx) {
  if (idx < 0 || idx >= filtTrades.length) return;
  const trade  = filtTrades[idx];
  currentIdx   = idx;
  currentTrade = trade;

  // Highlight row
  document.querySelectorAll('.bv-row').forEach(r => r.classList.remove('bv-selected'));
  const row = document.querySelector(`.bv-row[data-idx="${idx}"]`);
  if (row) { row.classList.add('bv-selected'); row.scrollIntoView({ block: 'nearest' }); }

  document.getElementById('bvTitle').textContent =
    _isMobile() ? 'Backtest Viewer' : `${trade.instrument} — Backtest Viewer`;

  _hideVeil();
  _applyTrade(trade);
  _renderDetail(trade, idx);
  _updateStats();

  // On mobile: close the panel so the chart is visible after selecting a trade
  if (_isMobile()) _closePanel();
}

function _prevTrade() { _selectTrade(currentIdx - 1); }
function _nextTrade() { _selectTrade(currentIdx + 1); }

// ── Levels toggle ─────────────────────────────────────────────────────────────

function _toggleLevels() {
  showLevels = !showLevels;
  // Sync both desktop and mobile buttons
  document.getElementById('bvLevels').classList.toggle('bv-active', showLevels);
  document.getElementById('bvPanelLevels').classList.toggle('bv-active', showLevels);
  if (currentTrade) {
    if (showLevels) _applyAnnotations(currentTrade);
    else            _clearAnnotations();
  }
}

// ── Detail Panel ──────────────────────────────────────────────────────────────

function _renderDetail(trade, idx) {
  const lvl    = adapter.getLevels(trade);
  const extra  = adapter.getDetail ? adapter.getDetail(trade) : {};
  const isSell = trade.side === 'SELL';
  const capital = filtCapitals[idx];

  const row = (lbl, val, cls = '') =>
    `<div class="bv-dr"><span class="bv-dl">${lbl}</span><span class="bv-dv ${cls}">${val ?? '—'}</span></div>`;

  const dirBadge = `<span class="bv-badge ${isSell ? 'sell' : 'buy'}">${trade.side}</span>`;
  const rgBadge  = `<span class="bv-badge rg-${(trade.regime || '').toLowerCase()}">${trade.regime || '—'}</span>`;
  const outColor = trade.outcome === 'win' ? 'bv-green' : trade.outcome === 'loss' ? 'bv-red' : 'bv-amber';
  const pnlColor = (trade.pnl_pct || 0) >= 0 ? 'bv-green' : 'bv-red';
  const pnlStr   = trade.pnl_pct != null
    ? `${trade.pnl_pct >= 0 ? '+' : ''}${trade.pnl_pct.toFixed(4)}%` : '—';
  const fillTime = trade.fill_time
    ? new Date(String(trade.fill_time).substring(0, 19).replace(' ', 'T') + 'Z')
        .toISOString().substring(11, 16)
    : '—';
  const asiaRange = extra.asiaRange || (trade.asia_low && trade.asia_high
    ? `${(+trade.asia_low).toFixed(5)} – ${(+trade.asia_high).toFixed(5)}` : '—');

  document.getElementById('bvDetailBody').innerHTML = [
    row('Date',       trade.date),
    row('Direction',  dirBadge),
    row('Entry px',   lvl ? lvl.entry.toFixed(5) : trade.open?.toFixed(5)),
    row('Entry time', fillTime),
    row('SL',         lvl?.sl?.toFixed(5),  'bv-red'),
    row('TP',         lvl?.tp?.toFixed(5),  'bv-green'),
    row('SD Level',   trade.hl_75_pct?.toFixed(2) ?? extra.sdLevel),
    row('Vol Regime', extra.volRegime || trade.vol_regime || '—'),
    row('Asia range', asiaRange),
    row('Regime',     rgBadge),
    row('Leg',        trade.leg || '—'),
    row('P&L',        pnlStr, pnlColor),
    row('Result',     `<span class="${outColor}">${trade.outcome || '—'}</span>`),
    row('Capital',    capital ? `$${capital.toLocaleString()}` : '—'),
  ].join('');
}

// ── Trade List ────────────────────────────────────────────────────────────────

function _renderList() {
  const list = document.getElementById('bvList');
  if (!list) return;
  list.innerHTML = filtTrades.map((t, i) => {
    const isSell = t.side === 'SELL';
    const isWin  = t.outcome === 'win';
    const isLoss = t.outcome === 'loss';
    const pnlStr = t.pnl_pct != null
      ? `${t.pnl_pct >= 0 ? '+' : ''}${t.pnl_pct.toFixed(1)}%` : '';
    const pnlCls = isWin ? 'bv-green' : isLoss ? 'bv-red' : 'bv-amber';
    const selCls = i === currentIdx ? ' bv-selected' : '';
    return `<div class="bv-row${selCls}" data-idx="${i}">
      <span class="bv-row-date">${t.date || '—'}</span>
      <span class="bv-badge ${isSell ? 'sell' : 'buy'}">${t.side}</span>
      <span class="bv-row-px">${(t.open || 0).toFixed(4)}</span>
      <span class="bv-outcome ${t.outcome || ''}">${(t.outcome || '').toUpperCase()}</span>
      <span class="bv-row-pnl ${pnlCls}">${pnlStr}</span>
    </div>`;
  }).join('');
}

// ── Veil ──────────────────────────────────────────────────────────────────────

function _setVeil(msg, spinner) {
  document.getElementById('bvVeil').style.display        = '';
  document.getElementById('bvVeilMsg').textContent       = msg;
  document.getElementById('bvVeilSpinner').style.display = spinner ? '' : 'none';
}

function _hideVeil() {
  document.getElementById('bvVeil').style.display = 'none';
}

// ── Boot ──────────────────────────────────────────────────────────────────────

if (!adapter) {
  document.body.innerHTML =
    `<div style="padding:40px;color:#ef5350;font-family:monospace">
      Unknown source "${source}". Available: ${Object.keys(ADAPTERS).join(', ')}
    </div>`;
} else {

  // Desktop controls
  document.getElementById('bvFResult').addEventListener('change', e => { fResult = e.target.value; _applyFilters(); });
  document.getElementById('bvFDir')   .addEventListener('change', e => { fDir    = e.target.value; _applyFilters(); });
  document.getElementById('bvLevels') .addEventListener('click',  _toggleLevels);
  document.getElementById('bvReCenter').addEventListener('click', _reCenter);
  document.getElementById('bvPrevBtn').addEventListener('click',  _prevTrade);
  document.getElementById('bvNextBtn').addEventListener('click',  _nextTrade);
  document.getElementById('bvList')   .addEventListener('click', e => {
    const row = e.target.closest('.bv-row');
    if (row) _selectTrade(+row.dataset.idx);
  });

  // Mobile panel controls
  document.getElementById('bvMobToggle')   .addEventListener('click', _togglePanel);
  document.getElementById('bvBackdrop')    .addEventListener('click', _closePanel);
  document.getElementById('bvClosePanel')  .addEventListener('click', _closePanel);
  document.getElementById('bvPanelLevels') .addEventListener('click', _toggleLevels);
  document.getElementById('bvPanelReCenter').addEventListener('click', () => { _reCenter(); _closePanel(); });
  document.getElementById('bvMobPrev')     .addEventListener('click', _prevTrade);
  document.getElementById('bvMobNext')     .addEventListener('click', _nextTrade);

  // Keyboard shortcuts (desktop)
  document.addEventListener('keydown', e => {
    if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
    if (e.key === 'ArrowLeft')  { e.preventDefault(); _prevTrade(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); _nextTrade(); }
    if (e.key === 'l' || e.key === 'L') _toggleLevels();
    if (e.key === 'Enter') _reCenter();
    if (e.key === 'Escape') _closePanel();
  });

  // Back link in topbar
  const back = BACK_LINKS[source];
  if (back) {
    const topbar = document.getElementById('bvTopbar');
    const a = document.createElement('a');
    a.href = back.href;
    a.textContent = back.label;
    a.style.cssText = 'font-family:"DM Mono",monospace;font-size:11px;color:#5a6380;text-decoration:none;white-space:nowrap;flex-shrink:0;order:-1;margin-right:4px';
    a.addEventListener('mouseenter', () => a.style.color = '#9aa8c0');
    a.addEventListener('mouseleave', () => a.style.color = '#5a6380');
    topbar.insertBefore(a, topbar.firstChild);
  }

  // Init TradingView widget and load trades
  _initTV();
  _loadTrades();

  window._bv = { selectTrade: _selectTrade, reCenter: _reCenter };
}
</script>
</body>
</html>
